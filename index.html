<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V3GASBOI — Official Folio</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e8000a;
    --gold: #d4a017;
    --white: #f5f0e8;
    --black: #080808;
    --charcoal: #111111;
    --dim: #1a1a1a;
    --muted: #888;
    --neon: #ff3c00;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
  }

  /* NOISE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 48px;
    background: linear-gradient(to bottom, rgba(8,8,8,0.95), transparent);
    backdrop-filter: blur(2px);
  }

  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.15em;
    color: var(--white);
  }

  .nav-logo span { color: var(--red); }

  .nav-links {
    display: flex;
    gap: 32px;
    list-style: none;
  }

  .nav-links a {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--white); }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 0 48px 80px;
    position: relative;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 70% 40%, rgba(232,0,10,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 20% 80%, rgba(212,160,23,0.06) 0%, transparent 60%),
      linear-gradient(160deg, #0a0a0a 0%, #080808 50%, #0d0505 100%);
  }

  .hero-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,0,10,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,0,10,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: linear-gradient(to bottom, transparent 0%, black 30%, black 70%, transparent 100%);
  }

  .hero-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.3em;
    color: var(--red);
    text-transform: uppercase;
    margin-bottom: 16px;
    position: relative;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .hero-tag::before {
    content: '';
    width: 32px;
    height: 1px;
    background: var(--red);
  }

  .hero-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5rem, 14vw, 12rem);
    line-height: 0.85;
    letter-spacing: 0.02em;
    position: relative;
  }

  .hero-name .v3 { color: var(--white); }
  .hero-name .gas { color: var(--red); }
  .hero-name .boi { color: var(--gold); }

  .hero-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(1rem, 2.5vw, 1.6rem);
    font-weight: 300;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 16px;
    margin-bottom: 48px;
  }

  .hero-stats {
    display: flex;
    gap: 48px;
    position: relative;
  }

  .hero-stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .hero-stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    color: var(--white);
    line-height: 1;
  }

  .hero-stat-num span { color: var(--red); }

  .hero-stat-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .hero-divider {
    width: 1px;
    background: rgba(255,255,255,0.08);
    align-self: stretch;
  }

  .scroll-hint {
    position: absolute;
    bottom: 32px;
    right: 48px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    writing-mode: vertical-rl;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .scroll-hint::before {
    content: '';
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, transparent, var(--muted));
    animation: scrollLine 2s ease-in-out infinite;
  }

  @keyframes scrollLine {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  /* SECTIONS */
  section {
    padding: 100px 48px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 48px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.06);
  }

  /* ABOUT */
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: start;
  }

  .about-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 6vw, 5.5rem);
    line-height: 0.9;
    margin-bottom: 32px;
  }

  .about-title em {
    font-style: normal;
    color: var(--red);
  }

  .about-body {
    font-size: 1rem;
    line-height: 1.8;
    color: rgba(245,240,232,0.7);
    max-width: 480px;
  }

  .about-body p + p { margin-top: 16px; }

  .about-right {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .badge {
    border: 1px solid rgba(255,255,255,0.08);
    padding: 20px 24px;
    background: rgba(255,255,255,0.02);
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .badge::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--red);
  }

  .badge:hover { border-color: rgba(232,0,10,0.3); }

  .badge-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .badge-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 0.05em;
    color: var(--white);
  }

  /* METRICS */
  .metrics-full {
    background: linear-gradient(135deg, #0d0d0d, #111);
    border: 1px solid rgba(255,255,255,0.05);
    padding: 60px;
    margin: 0 48px;
    max-width: none;
  }

  .metrics-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 48px;
  }

  .metrics-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 5vw, 4rem);
    line-height: 1;
  }

  .metrics-title span { color: var(--red); }

  .metrics-period {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: rgba(255,255,255,0.04);
    margin-bottom: 48px;
  }

  .metric-cell {
    background: var(--charcoal);
    padding: 32px 28px;
    transition: background 0.3s;
  }

  .metric-cell:hover { background: #161616; }

  .metric-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 4vw, 3.8rem);
    line-height: 1;
    color: var(--white);
    margin-bottom: 8px;
  }

  .metric-num .accent { color: var(--red); }
  .metric-num .gold { color: var(--gold); }

  .metric-desc {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    line-height: 1.4;
  }

  /* PLATFORMS */
  .platforms-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }

  .platform-card {
    border: 1px solid rgba(255,255,255,0.06);
    padding: 28px;
    background: rgba(255,255,255,0.015);
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .platform-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--red);
    transform: scaleX(0);
    transition: transform 0.3s;
    transform-origin: left;
  }

  .platform-card:hover { border-color: rgba(232,0,10,0.2); }
  .platform-card:hover::after { transform: scaleX(1); }

  .platform-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  .platform-stat {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    color: var(--white);
    line-height: 1;
    margin-bottom: 4px;
  }

  .platform-stat span { color: var(--red); font-size: 1.4rem; }

  .platform-note {
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.5;
  }

  /* LOCATIONS */
  .locations-section { background: var(--black); }

  .locations-intro {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 4vw, 3.5rem);
    margin-bottom: 48px;
    line-height: 1;
  }

  .locations-intro span { color: var(--red); }

  .locations-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 2px;
  }

  .loc-item {
    padding: 16px 20px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.04);
    transition: all 0.2s;
    cursor: default;
  }

  .loc-item:hover {
    background: rgba(232,0,10,0.06);
    border-color: rgba(232,0,10,0.2);
  }

  .loc-flag { font-size: 1.4rem; margin-bottom: 6px; }

  .loc-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    color: var(--white);
  }

  .loc-plays {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    color: var(--red);
  }

  /* STRIP RAP */
  .striprap-section {
    background: linear-gradient(180deg, var(--black) 0%, #0a0303 50%, var(--black) 100%);
    padding: 100px 0;
    overflow: hidden;
  }

  .striprap-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 48px;
  }

  .striprap-marquee {
    overflow: hidden;
    margin: 0 -48px 60px;
    white-space: nowrap;
  }

  .striprap-marquee-track {
    display: inline-block;
    animation: marquee 20s linear infinite;
  }

  .striprap-marquee span {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4rem, 10vw, 8rem);
    letter-spacing: 0.05em;
    color: rgba(255,255,255,0.03);
    padding: 0 32px;
  }

  .striprap-marquee span.accent {
    color: rgba(232,0,10,0.15);
  }

  @keyframes marquee {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .striprap-content {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 80px;
    align-items: start;
  }

  .striprap-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.5rem, 7vw, 6rem);
    line-height: 0.9;
    margin-bottom: 32px;
  }

  .striprap-title span { color: var(--red); }

  .striprap-body {
    font-size: 1rem;
    line-height: 1.85;
    color: rgba(245,240,232,0.65);
    margin-bottom: 32px;
  }

  .striprap-quote {
    border-left: 3px solid var(--red);
    padding: 20px 24px;
    background: rgba(232,0,10,0.04);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem;
    font-weight: 300;
    line-height: 1.6;
    color: rgba(245,240,232,0.8);
    font-style: italic;
  }

  .striprap-pillars {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .pillar {
    display: grid;
    grid-template-columns: 40px 1fr;
    gap: 16px;
    align-items: start;
    padding: 20px;
    border: 1px solid rgba(255,255,255,0.05);
    background: rgba(255,255,255,0.015);
    transition: all 0.3s;
  }

  .pillar:hover {
    border-color: rgba(232,0,10,0.2);
    background: rgba(232,0,10,0.03);
  }

  .pillar-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    color: rgba(232,0,10,0.3);
    line-height: 1;
  }

  .pillar-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--white);
    margin-bottom: 6px;
  }

  .pillar-text {
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.5;
  }

  /* CATALOG */
  .catalog-section { }

  .catalog-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 5vw, 4.5rem);
    margin-bottom: 48px;
    line-height: 1;
  }

  .catalog-title span { color: var(--red); }

  .tracks-list {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
  }

  .track-row {
    display: grid;
    grid-template-columns: 32px 1fr auto;
    align-items: center;
    gap: 16px;
    padding: 14px 20px;
    background: rgba(255,255,255,0.015);
    border: 1px solid rgba(255,255,255,0.04);
    transition: all 0.2s;
  }

  .track-row:hover {
    background: rgba(232,0,10,0.05);
    border-color: rgba(232,0,10,0.15);
  }

  .track-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.9rem;
    color: rgba(255,255,255,0.15);
  }

  .track-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    letter-spacing: 0.03em;
    color: var(--white);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .track-plays {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    color: var(--red);
    white-space: nowrap;
  }

  /* EBOOK */
  .ebook-section {
    background: linear-gradient(135deg, #0a0a0a, #0d0505);
    border-top: 1px solid rgba(232,0,10,0.1);
    border-bottom: 1px solid rgba(232,0,10,0.1);
    padding: 100px 48px;
    max-width: none;
    margin: 0;
  }

  .ebook-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1.5fr;
    gap: 80px;
    align-items: center;
  }

  .ebook-cover {
    aspect-ratio: 3/4;
    background: linear-gradient(135deg, #1a0505, #2d0000);
    border: 2px solid rgba(232,0,10,0.3);
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 40px;
    overflow: hidden;
    max-width: 280px;
  }

  .ebook-cover::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 50% 30%, rgba(232,0,10,0.2), transparent 60%),
      linear-gradient(to bottom, rgba(232,0,10,0.05), transparent);
  }

  .ebook-cover-price {
    position: absolute;
    top: 20px;
    right: 20px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    color: var(--gold);
    background: rgba(212,160,23,0.1);
    border: 1px solid rgba(212,160,23,0.3);
    padding: 4px 12px;
  }

  .ebook-cover-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    line-height: 0.9;
    position: relative;
    color: var(--white);
  }

  .ebook-cover-title span { color: var(--red); }

  .ebook-cover-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 12px;
    position: relative;
  }

  .ebook-cover-author {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem;
    color: var(--gold);
    margin-top: 24px;
    position: relative;
    letter-spacing: 0.1em;
  }

  .ebook-content { }

  .ebook-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 5vw, 4.5rem);
    line-height: 0.9;
    margin-bottom: 24px;
  }

  .ebook-title span { color: var(--red); }

  .ebook-desc {
    font-size: 1rem;
    line-height: 1.8;
    color: rgba(245,240,232,0.65);
    margin-bottom: 32px;
    max-width: 520px;
  }

  .ebook-chapters {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 40px;
  }

  .chapter {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 20px;
    border: 1px solid rgba(255,255,255,0.05);
    background: rgba(255,255,255,0.015);
  }

  .chapter-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.8rem;
    color: var(--red);
    min-width: 48px;
    letter-spacing: 0.1em;
  }

  .chapter-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
  }

  .ebook-cta {
    display: inline-block;
    background: var(--red);
    color: var(--white);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    padding: 16px 40px;
    text-decoration: none;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .ebook-cta::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.1);
    transform: translateX(-100%);
    transition: transform 0.3s;
  }

  .ebook-cta:hover::before { transform: translateX(0); }

  /* CERTS */
  .certs-section { }

  .certs-intro {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 48px;
  }

  .certs-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 5vw, 4.5rem);
    line-height: 0.9;
  }

  .certs-title span { color: var(--red); }

  .certs-total {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    text-align: right;
  }

  .certs-total strong {
    display: block;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--gold);
    letter-spacing: 0.05em;
  }

  .certs-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .cert-card {
    border: 1px solid rgba(255,255,255,0.06);
    padding: 28px;
    background: rgba(255,255,255,0.015);
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
  }

  .cert-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(to right, var(--red), transparent);

  }

  .cert-institution {
    font-family: 'Barlow Condensed', sans-serif;
