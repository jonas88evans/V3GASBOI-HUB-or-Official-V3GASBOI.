<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V3GASBOI — Official Folio + AI Command Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e8000a;
    --gold: #d4a017;
    --white: #f5f0e8;
    --black: #080808;
    --charcoal: #111111;
    --dim: #1a1a1a;
    --muted: #888;
    --neon: #ff3c00;
    --cyan: #00ffff;
    --magenta: #ff00ff;
    --purple: #b366ff;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; width: 100%; z-index: 200;
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 48px;
    background: linear-gradient(to bottom, rgba(8,8,8,0.97), transparent);
    backdrop-filter: blur(4px);
  }
  .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: .15em; }
  .nav-logo span { color: var(--red); }
  .nav-links { display: flex; gap: 28px; list-style: none; }
  .nav-links a {
    font-family: 'Barlow Condensed', sans-serif; font-size: .72rem;
    font-weight: 600; letter-spacing: .2em; text-transform: uppercase;
    color: var(--muted); text-decoration: none; transition: color .2s;
  }
  .nav-links a:hover { color: var(--white); }
  .nav-links a.ai-link { color: var(--cyan); }
  .nav-links a.ai-link:hover { color: #fff; text-shadow: 0 0 10px var(--cyan); }

  /* ── HERO ── */
  .hero {
    min-height: 100vh; display: flex; flex-direction: column;
    justify-content: flex-end; padding: 0 48px 80px;
    position: relative; overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 70% 40%, rgba(232,0,10,.12) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 20% 80%, rgba(212,160,23,.06) 0%, transparent 60%),
      linear-gradient(160deg, #0a0a0a 0%, #080808 50%, #0d0505 100%);
  }
  .hero-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(232,0,10,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,0,10,.04) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: linear-gradient(to bottom, transparent 0%, black 30%, black 70%, transparent 100%);
  }
  .hero-tag {
    font-family: 'Barlow Condensed', sans-serif; font-size: .7rem; font-weight: 600;
    letter-spacing: .3em; color: var(--red); text-transform: uppercase;
    margin-bottom: 16px; position: relative; display: flex; align-items: center; gap: 12px;
  }
  .hero-tag::before { content: ''; width: 32px; height: 1px; background: var(--red); }
  .hero-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5rem, 14vw, 12rem); line-height: .85; letter-spacing: .02em; position: relative;
  }
  .hero-name .v3 { color: var(--white); }
  .hero-name .gas { color: var(--red); }
  .hero-name .boi { color: var(--gold); }
  .hero-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(1rem, 2.5vw, 1.6rem); font-weight: 300;
    letter-spacing: .25em; color: var(--muted); text-transform: uppercase;
    margin-top: 16px; margin-bottom: 48px;
  }
  .hero-stats { display: flex; gap: 48px; position: relative; }
  .hero-stat { display: flex; flex-direction: column; gap: 4px; }
  .hero-stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; color: var(--white); line-height: 1; }
  .hero-stat-num span { color: var(--red); }
  .hero-stat-label { font-family: 'Barlow Condensed', sans-serif; font-size: .65rem; font-weight: 600; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); }
  .hero-divider { width: 1px; background: rgba(255,255,255,.08); align-self: stretch; }
  .scroll-hint {
    position: absolute; bottom: 32px; right: 48px;
    font-family: 'Barlow Condensed', sans-serif; font-size: .65rem;
    letter-spacing: .25em; color: var(--muted); text-transform: uppercase;
    writing-mode: vertical-rl; display: flex; align-items: center; gap: 8px;
  }
  .scroll-hint::before {
    content: ''; width: 1px; height: 40px;
    background: linear-gradient(to bottom, transparent, var(--muted));
    animation: scrollLine 2s ease-in-out infinite;
  }
  @keyframes scrollLine { 0%,100%{opacity:.3} 50%{opacity:1} }

  /* ── SECTION BASE ── */
  section { padding: 100px 48px; max-width: 1400px; margin: 0 auto; }
  .section-label {
    font-family: 'Barlow Condensed', sans-serif; font-size: .65rem; font-weight: 600;
    letter-spacing: .35em; text-transform: uppercase; color: var(--red);
    margin-bottom: 48px; display: flex; align-items: center; gap: 16px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,.06); }

  /* ── ABOUT ── */
  .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }
  .about-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3rem,6vw,5.5rem); line-height: .9; margin-bottom: 32px; }
  .about-title em { font-style: normal; color: var(--red); }
  .about-body { font-size: 1rem; line-height: 1.8; color: rgba(245,240,232,.7); max-width: 480px; }
  .about-body p+p { margin-top: 16px; }
  .about-right { display: flex; flex-direction: column; gap: 24px; }
  .badge {
    border: 1px solid rgba(255,255,255,.08); padding: 20px 24px;
    background: rgba(255,255,255,.02); position: relative; overflow: hidden; transition: border-color .3s;
  }
  .badge::before { content: ''; position: absolute; top:0; left:0; width:3px; height:100%; background: var(--red); }
  .badge:hover { border-color: rgba(232,0,10,.3); }
  .badge-title { font-family: 'Barlow Condensed', sans-serif; font-size: .7rem; font-weight: 600; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .badge-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: .05em; }

  /* ── METRICS ── */
  .metrics-full {
    background: linear-gradient(135deg, #0d0d0d, #111);
    border: 1px solid rgba(255,255,255,.05);
    padding: 60px; margin: 0 48px; max-width: none;
  }
  .metrics-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 48px; }
  .metrics-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.5rem,5vw,4rem); line-height: 1; }
  .metrics-title span { color: var(--red); }
  .metrics-period { font-family: 'Barlow Condensed', sans-serif; font-size: .7rem; letter-spacing: .25em; color: var(--muted); text-transform: uppercase; }
  .metrics-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: rgba(255,255,255,.04); margin-bottom: 48px; }
  .metric-cell { background: var(--charcoal); padding: 32px 28px; transition: background .3s; }
  .metric-cell:hover { background: #161616; }
  .metric-num { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.5rem,4vw,3.8rem); line-height: 1; color: var(--white); margin-bottom: 8px; }
  .metric-num .accent { color: var(--red); }
  .metric-num .gold { color: var(--gold); }
  .metric-desc { font-family: 'Barlow Condensed', sans-serif; font-size: .7rem; font-weight: 600; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); line-height: 1.4; }
  .platforms-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; }
  .platform-card {
    border: 1px solid rgba(255,255,255,.06); padding: 28px;
    background: rgba(255,255,255,.015); transition: all .3s; position: relative; overflow: hidden;
  }
  .platform-card::after {
    content: ''; position: absolute; bottom:0; left:0; right:0; height:2px;
    background: var(--red); transform: scaleX(0); transition: transform .3s; transform-origin: left;
  }
  .platform-card:hover { border-color: rgba(232,0,10,.2); }
  .platform-card:hover::after { transform: scaleX(1); }
  .platform-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: .1em; color: var(--muted); margin-bottom: 16px; text-transform: uppercase; }
  .platform-stat { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; color: var(--white); line-height: 1; margin-bottom: 4px; }
  .platform-stat span { color: var(--red); font-size: 1.4rem; }
  .platform-note { font-size: .8rem; color: var(--muted); line-height: 1.5; }

  /* ── STRIP RAP ── */
  .striprap-section { background: linear-gradient(180deg, var(--black) 0%, #0a0303 50%, var(--black) 100%); padding: 100px 0; overflow: hidden; }
  .striprap-inner { max-width: 1400px; margin: 0 auto; padding: 0 48px; }
  .striprap-marquee { overflow: hidden; margin: 0 -48px 60px; white-space: nowrap; }
  .striprap-marquee-track { display: inline-block; animation: marquee 20s linear infinite; }
  .striprap-marquee span { font-family: 'Bebas Neue', sans-serif; font-size: clamp(4rem,10vw,8rem); letter-spacing: .05em; color: rgba(255,255,255,.03); padding: 0 32px; }
  .striprap-marquee span.accent { color: rgba(232,0,10,.15); }
  @keyframes marquee { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
  .striprap-content { display: grid; grid-template-columns: 1.2fr 1fr; gap: 80px; align-items: start; }
  .striprap-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3.5rem,7vw,6rem); line-height: .9; margin-bottom: 32px; }
  .striprap-title span { color: var(--red); }
  .striprap-body { font-size: 1rem; line-height: 1.85; color: rgba(245,240,232,.65); margin-bottom: 32px; }
  .striprap-quote { border-left: 3px solid var(--red); padding: 20px 24px; background: rgba(232,0,10,.04); font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 300; line-height: 1.6; color: rgba(245,240,232,.8); font-style: italic; }
  .striprap-pillars { display: flex; flex-direction: column; gap: 16px; }
  .pillar { display: grid; grid-template-columns: 40px 1fr; gap: 16px; align-items: start; padding: 20px; border: 1px solid rgba(255,255,255,.05); background: rgba(255,255,255,.015); transition: all .3s; }
  .pillar:hover { border-color: rgba(232,0,10,.2); background: rgba(232,0,10,.03); }
  .pillar-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: rgba(232,0,10,.3); line-height: 1; }
  .pillar-title { font-family: 'Barlow Condensed', sans-serif; font-size: .75rem; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: var(--white); margin-bottom: 6px; }
  .pillar-text { font-size: .85rem; color: var(--muted); line-height: 1.5; }

  /* ── CERTS ── */
  .certs-intro { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 48px; }
  .certs-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.5rem,5vw,4.5rem); line-height: .9; }
  .certs-title span { color: var(--red); }
  .certs-total { font-family: 'Barlow Condensed', sans-serif; font-size: .7rem; font-weight: 600; letter-spacing: .2em; color: var(--muted); text-transform: uppercase; text-align: right; }
  .certs-total strong { display: block; font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--gold); letter-spacing: .05em; }
  .certs-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
  .cert-card { border: 1px solid rgba(255,255,255,.06); padding: 28px; background: rgba(255,255,255,.015); position: relative; overflow: hidden; transition: all .3s; }
  .cert-card::before { content: ''; position: absolute; top:0; left:0; right:0; height:2px; background: linear-gradient(to right, var(--red), transparent); }
  .cert-card:hover { border-color: rgba(232,0,10,.2); background: rgba(232,0,10,.03); }
  .cert-institution { font-family: 'Barlow Condensed', sans-serif; font-size: .65rem; font-weight: 700; letter-spacing: .25em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .cert-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.05rem; line-height: 1.3; color: var(--white); margin-bottom: 16px; }
  .cert-meta { display: flex; justify-content: space-between; align-items: flex-end; }
  .cert-details { display: flex; flex-direction: column; gap: 4px; }
  .cert-detail { font-size: .78rem; color: rgba(245,240,232,.5); }

  /* ══════════════════════════════════════════════
     AI COMMAND HUB — FULL SECTION
  ══════════════════════════════════════════════ */
  .ai-hub-section {
    background: #050810;
    border-top: 1px solid rgba(0,255,255,.08);
    border-bottom: 1px solid rgba(0,255,255,.08);
    padding: 100px 0;
    max-width: none;
    margin: 0;
    overflow: hidden;
    position: relative;
  }

  /* AI grid background */
  .ai-hub-section::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(0,255,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,255,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .ai-hub-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 48px;
    position: relative;
    z-index: 1;
  }

  /* AI Hub Header */
  .ai-hub-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 48px;
    border-bottom: 1px solid rgba(0,255,255,.08);
    padding-bottom: 32px;
  }

  .ai-hub-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(2rem, 4vw, 3.2rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--cyan) 0%, #6699ff 50%, var(--magenta) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
    margin-bottom: 8px;
  }

  .ai-hub-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: .72rem;
    letter-spacing: .25em;
    color: rgba(0,255,255,.4);
  }

  .ai-status-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: .7rem;
    letter-spacing: .2em;
    color: var(--cyan);
    border: 1px solid rgba(0,255,255,.2);
    padding: 8px 16px;
    background: rgba(0,255,255,.04);
  }

  .ai-status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--cyan);
    animation: blink 1.2s infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* Tab Nav */
  .ai-tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 32px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .ai-tabs::-webkit-scrollbar { display: none; }

  .ai-tab {
    font-family: 'Share Tech Mono', monospace;
    font-size: .68rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    padding: 12px 20px;
    border: none;
    background: rgba(255,255,255,.02);
    color: rgba(255,255,255,.3);
    cursor: pointer;
    transition: all .25s;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    border-top: 1px solid rgba(255,255,255,.04);
    border-left: 1px solid rgba(255,255,255,.04);
    border-right: 1px solid rgba(255,255,255,.04);
  }

  .ai-tab:hover { color: rgba(255,255,255,.7); background: rgba(0,255,255,.04); }

  .ai-tab.active {
    color: var(--cyan);
    background: rgba(0,255,255,.06);
    border-bottom-color: var(--cyan);
    border-top-color: rgba(0,255,255,.2);
  }

  /* Tab Panels */
  .ai-panel { display: none; animation: fadeUp .3s ease; }
  .ai-panel.active { display: block; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  /* ── PANEL: OMNIFUSION ── */
  .fusion-layout {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 24px;
    align-items: start;
  }

  .fusion-engines {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .engine-card {
    border: 1px solid #0d2040;
    background: linear-gradient(135deg, #060c1a, #080f20);
    padding: 18px;
    position: relative;
    overflow: hidden;
    transition: border-color .3s, box-shadow .3s;
  }

  .engine-card.active-engine {
    border-color: var(--cyan);
    box-shadow: 0 0 16px rgba(0,255,255,.15);
    animation: enginePulse 2s infinite;
  }

  .engine-card.done-engine { border-color: rgba(0,255,255,.3); box-shadow: 0 0 10px rgba(0,255,255,.08); }
  .engine-card.narrative-done { border-color: rgba(255,0,255,.3); box-shadow: 0 0 10px rgba(255,0,255,.08); }
  .engine-card.visual-done { border-color: rgba(179,102,255,.3); box-shadow: 0 0 10px rgba(179,102,255,.08); }
  .engine-card.audio-done { border-color: rgba(212,160,23,.3); box-shadow: 0 0 10px rgba(212,160,23,.08); }

  @keyframes enginePulse {
    0%,100%{box-shadow:0 0 10px rgba(0,255,255,.1)}
    50%{box-shadow:0 0 24px rgba(0,255,255,.3)}
  }

  .engine-corner-tl {
    position: absolute; top:0; left:0;
    width:10px; height:10px;
    border-top: 2px solid currentColor;
    border-left: 2px solid currentColor;
  }
  .engine-corner-br {
    position: absolute; bottom:0; right:0;
    width:10px; height:10px;
    border-bottom: 2px solid currentColor;
    border-right: 2px solid currentColor;
  }

  .engine-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
  }

  .engine-icon { font-size: 16px; line-height: 1; }

  .engine-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: .58rem; letter-spacing: .2em; font-weight: 700;
    flex: 1;
  }

  .engine-status-dot {
    width: 6px; height: 6px; border-radius: 50%; background: #1e2d48;
    transition: background .3s;
  }

  .engine-status-dot.processing { background: var(--cyan); animation: blink .6s infinite; }
  .engine-status-dot.done-cyan { background: var(--cyan); }
  .engine-status-dot.done-mag { background: var(--magenta); }
  .engine-status-dot.done-purple { background: var(--purple); }
  .engine-status-dot.done-gold { background: var(--gold); }

  .engine-body { font-family: 'Share Tech Mono', monospace; font-size: .7rem; color: #3a5070; }
  .engine-body.has-data { color: #a0b8d0; }
  .engine-result-key { color: rgba(0,255,255,.5); font-size: .58rem; letter-spacing: .2em; display: block; margin-bottom: 2px; margin-top: 8px; }
  .engine-result-key:first-child { margin-top: 0; }
  .engine-result-val { color: #c8d8f0; font-size: .72rem; line-height: 1.4; }

  .bar-loader { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
  .bar-track { height: 4px; background: #0d1628; border-radius: 1px; overflow: hidden; }
  .bar-fill {
    height: 100%; border-radius: 1px;
    animation: barAnim .8s ease both;
  }
  @keyframes barAnim { from{width:0} to{width:var(--w)} }

  /* Fusion sidebar */
  .fusion-sidebar { display: flex; flex-direction: column; gap: 16px; }

  .fusion-input-box {
    border: 1px solid #0d2040;
    background: linear-gradient(135deg, #060c1a, #080f1e);
    padding: 18px;
    position: relative;
  }

  .fusion-input-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: .6rem; letter-spacing: .3em; color: rgba(0,255,255,.5);
    margin-bottom: 8px;
  }

  .fusion-textarea {
    width: 100%; background: transparent; border: none;
    border-bottom: 1px solid #0d2040; color: #c8d8f0;
    font-size: .9rem; font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600; letter-spacing: .05em; outline: none;
    resize: none; padding:
