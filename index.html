<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonicType</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body{font-family:'Space Grotesk',sans-serif;background:#0a0a0a;overflow-x:hidden}
        .display-font{font-family:'Syncopate',sans-serif}
        .bar{width:4px;background:linear-gradient(to top,#00f2ff,#7000ff);border-radius:2px}
        .gradient-text{background:linear-gradient(135deg,#00f2ff 0%,#7000ff 50%,#ff00c1 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .glass-panel{background:rgba(20,20,20,0.6);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1)}
        #visualizer-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:0.3;pointer-events:none}
    </style>
</head>
<body class="text-white min-h-screen relative">
<canvas id="visualizer-canvas"></canvas>
<div id="upload-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-black">
    <div class="relative z-10 text-center px-6 max-w-2xl">
        <h1 class="display-font text-6xl md:text-8xl font-bold mb-6">SONIC TYPE</h1>
        <p class="text-gray-400 text-lg mb-12 tracking-widest uppercase">Transform your music into visual poetry</p>
        <div class="relative group cursor-pointer" onclick="document.getElementById('file-input').click()">
            <div class="absolute -inset-1 bg-gradient-to-r from-cyan-500 via-purple-500 to-pink-500 rounded-lg blur opacity-25 group-hover:opacity-75 transition"></div>
            <div class="relative glass-panel rounded-lg p-12 border border-gray-800 hover:border-gray-600 transition-all">
                <svg class="w-16 h-16 mx-auto text-gray-400 mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
                <p class="text-xl font-semibold mb-2">Drop your MP3 here</p>
                <p class="text-sm text-gray-500">or click to browse</p>
                <input type="file" id="file-input" accept="audio/mp3,audio/mpeg" class="hidden" onchange="handleFileUpload(event)">
            </div>
        </div>
    </div>
</div>
<div id="player-interface" class="fixed inset-0 z-40 hidden">
    <div class="absolute top-0 left-0 w-full p-6 flex justify-between items-center z-50">
        <button onclick="resetPlayer()" class="text-gray-400 hover:text-white">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </button>
        <h2 id="track-name" class="font-bold text-lg">Unknown Track</h2>
        <button onclick="changeStyle()" class="glass-panel px-4 py-2 rounded-full text-xs uppercase">Style: <span id="current-style">Neon</span></button>
    </div>
    <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
        <div id="lyrics-text" class="display-font text-5xl md:text-7xl lg:text-8xl font-bold gradient-text text-center px-6">Loading...</div>
    </div>
    <div class="absolute bottom-0 left-0 w-full p-8 z-50">
        <div class="glass-panel rounded-2xl p-6 max-w-4xl mx-auto">
            <div class="h-1 bg-gray-700 rounded-full overflow-hidden mb-4 cursor-pointer" onclick="seekAudio(event)">
                <div id="progress-bar" class="h-full bg-gradient-to-r from-cyan-500 to-purple-500 w-0"></div>
            </div>
            <div class="flex items-center justify-between">
                <button onclick="togglePlay()" class="w-14 h-14 rounded-full bg-white text-black flex items-center justify-center">
                    <svg id="play-icon" class="w-6 h-6 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pause-icon" class="w-6 h-6 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <div class="flex items-end gap-1 h-8" id="mini-viz"></div>
            </div>
        </div>
    </div>
</div>
<audio id="audio-player"></audio>
<script>
const lyrics={neon:["Electric dreams in digital streams","Neon hearts beating in the dark","We are stardust wrapped in skin","Dancing on the edge of tomorrow"],mono:["Silence speaks louder than words","Shadows dancing on white walls","The space between the notes","Black and white wrong and right"],nature:["Roots growing deep into the soil","Leaves whispering ancient secrets","The rhythm of the falling rain","Mountains breathing slow and steady"]};
let style='neon',ctx,analyser,audio=document.getElementById('audio-player'),playing=false,index=0,interval;

for(let i=0;i<20;i++){let b=document.createElement('div');b.className='bar';b.style.height='4px';document.getElementById('mini-viz').appendChild(b)}

function handleFileUpload(e){
    let f=e.target.files[0];
    if(f){
        audio.src=URL.createObjectURL(f);
        document.getElementById('track-name').textContent=f.name.replace('.mp3','');
        document.getElementById('upload-screen').style.display='none';
        document.getElementById('player-interface').classList.remove('hidden');
        document.getElementById('player-interface').style.opacity=1;
        initAudio();
        startLyrics();
    }
}

function initAudio(){
    let a=new(window.AudioContext||webkitAudioContext)();
    analyser=a.createAnalyser();
    analyser.fftSize=256;
    let s=a.createMediaElementSource(audio);
    s.connect(analyser);
    analyser.connect(a.destination);
    let c=document.getElementById('visualizer-canvas');
    ctx=c.getContext('2d');
    c.width=innerWidth;c.height=innerHeight;
    draw();
}

function draw(){
    requestAnimationFrame(draw);
    let data=new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    ctx.fillStyle='rgba(10,10,10,0.2)';ctx.fillRect(0,0,innerWidth,innerHeight);
    let w=(innerWidth/data.length)*2.5,x=0;
    for(let i=0;i<data.length;i++){
        let h=data[i]*1.5;
        ctx.fillStyle=`rgba(${h+(25*(i/data.length))},${250*(i/data.length)},255,0.3)`;
        ctx.fillRect(x,innerHeight-h,w,h);x+=w+1;
    }
    document.querySelectorAll('#mini-viz .bar').forEach((b,i)=>{
        let ix=Math.floor(i*(data.length/20));
        b.style.height=Math.max(4,(data[ix]/255)*32)+'px';
    });
}

function startLyrics(){
    let t=document.getElementById('lyrics-text');
    function update(){
        if(!playing)return;
        t.style.opacity=0;
        setTimeout(()=>{
            t.textContent=lyrics[style][index%4];
            t.style.opacity=1;
            index++;
        },500);
    }
    update();interval=setInterval(update,4000);
    togglePlay();
}

function togglePlay(){
    if(playing){audio.pause();document.getElementById('play-icon').classList.remove('hidden');document.getElementById('pause-icon').classList.add('hidden');playing=false}
    else{audio.play();document.getElementById('play-icon').classList.add('hidden');document.getElementById('pause-icon').classList.remove('hidden');playing=true}
}

function seekAudio(e){audio.currentTime=(e.offsetX/e.target.offsetWidth)*audio.duration}
function changeStyle(){let s=Object.keys(lyrics),i=(s.indexOf(style)+1)%3;style=s[i];document.getElementById('current-style').textContent=style}
function resetPlayer(){audio.pause();clearInterval(interval);document.getElementById('player-interface').classList.add('hidden');document.getElementById('upload-screen').style.display='flex';index=0;playing=false}

audio.ontimeupdate=()=>{if(audio.duration)document.getElementById('progress-bar').style.width=((audio.currentTime/audio.duration)*100)+'%'};
</script>
</body>
</html>
