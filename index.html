1   <!DOCTYPE html>
2   <html lang="en">
3   <head>
4       <meta charset="UTF-8">
5       <meta name="viewport" content="width=device-width, initial-scale=1.0">
6       <title>Affirmation Vibe</title>
7       <style>
8           *{margin:0;padding:0;box-sizing:border-box}
9           body{background:#0a0a0a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
10          .screen{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:absolute;transition:opacity .5s}
11          .hidden{opacity:0;pointer-events:none}
12          #drop{width:280px;height:280px;border:2px dashed #444;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .3s}
13          #drop:hover{border-color:#888;transform:scale(1.02)}
14          #drop p{margin-top:1rem;font-size:14px;color:#888}
15          h1{font-size:clamp(2rem,10vw,6rem);font-weight:200;text-align:center;padding:0 2rem;line-height:1.1;letter-spacing:-.02em}
16          #sub{margin-top:1.5rem;font-size:1.25rem;color:#666;font-weight:300}
17          #mood{position:fixed;top:2rem;font-size:12px;text-transform:uppercase;letter-spacing:4px;color:#444}
18          #controls{position:fixed;bottom:3rem;display:flex;gap:1rem;align-items:center}
19          button{background:transparent;border:1px solid #333;color:#fff;padding:.75rem 2rem;border-radius:100px;cursor:pointer;font-size:13px;transition:all .2s}
20          button:hover{border-color:#fff;background:rgba(255,255,255,.05)}
21          #progress{width:150px;height:3px;background:#222;border-radius:2px;cursor:pointer}
22          #fill{height:100%;background:#fff;border-radius:2px;width:0%;transition:width .1s}
23          input[type="file"]{display:none}
24          canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:.2}
25      </style>
26  </head>
27  <body>
28      <canvas id="viz"></canvas>
29      
30      <div id="upload" class="screen">
31          <div id="drop" onclick="document.querySelector('input').click()">
32              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1">
33                  <circle cx="12" cy="12" r="10"/>
34                  <path d="M12 8v8M8 12h8"/>
35              </svg>
36              <p>Drop music or click</p>
37          </div>
38          <input type="file" accept="audio/*" onchange="load(event)">
39      </div>
40      
41      <div id="player" class="screen hidden">
42          <div id="mood">Listening</div>
43          <h1 id="affirmation">You are exactly where you need to be</h1>
44          <p id="sub">Breathe and receive</p>
44          <div id="controls">
45              <button onclick="toggle()">Play</button>
46              <div id="progress" onclick="seek(event)"><div id="fill"></div></div>
47              <button onclick="save()">Save</button>
48              <button onclick="reset()">Back</button>
49          </div>
50      </div>
51      
52      <audio id="audio" crossorigin="anonymous"></audio>
53      
54      <script>
55      const affirmations={
56          high:["You are unstoppable energy","Your power radiates outward","You conquer every challenge","You are pure momentum","Your strength is infinite"],
57          calm:["Peace flows through you now","You are exactly here","Stillness is your power","You flow like water","Every breath renews you"],
58          focus:["Your mind is crystal clear","You create with intention","Distraction fades away","You are fully present","Trust your vision"],
59          happy:["Joy lives within you","You attract beautiful moments","Your light shines bright","You deserve all good things","Today is your gift"]
60      };
61      
62      let audio=document.getElementById('audio');
63      let ctx,analyser,source,playing=false;
64      let currentMood='calm';
65      let currentIndex=0;
66      
67      function load(e){
68          let file=e.target.files[0];
69          if(!file||!file.type.includes('audio'))return alert('Please upload audio file');
70          
71          audio.src=URL.createObjectURL(file);
72          document.getElementById('upload').classList.add('hidden');
73          document.getElementById('player').classList.remove('hidden');
74          
75          initAudio();
76          toggle();
77          updateAffirmation();
78      }
79      
80      function initAudio(){
81          if(ctx)return;
82          
83          try{
84              ctx=new(window.AudioContext||window.webkitAudioContext)();
85              analyser=ctx.createAnalyser();
86              analyser.fftSize=256;
87              
88              source=ctx.createMediaElementSource(audio);
89              source.connect(analyser);
90              analyser.connect(ctx.destination);
91              
92              drawViz();
93              detectMoodLoop();
94          }catch(err){
95              console.error('Audio init failed:',err);
96          }
97      }
98      
99      function drawViz(){
100         let canvas=document.getElementById('viz');
101         let c=canvas.getContext('2d');
102         canvas.width=window.innerWidth;
103         canvas.height=window.innerHeight;
104         
105         function frame(){
106             requestAnimationFrame(frame);
107             
108             let data=new Uint8Array(analyser.frequencyBinCount);
109             analyser.getByteFrequencyData(data);
110             
111             c.fillStyle='rgba(10,10,10,.15)';
112             c.fillRect(0,0,canvas.width,canvas.height);
113             
114             let w=canvas.width/data.length;
115             for(let i=0;i<data.length;i++){
115                 let h=(data[i]/255)*canvas.height*.5;
116                 c.fillStyle=`hsla(${200+i},70%,60%,${data[i]/500})`;
117                 c.fillRect(i*w,canvas.height-h,w,h);
118             }
119         }
120         frame();
121     }
122     
123     function detectMoodLoop(){
124         setInterval(()=>{
125             if(!playing||!analyser)return;
126             
127             let data=new Uint8Array(analyser.frequencyBinCount);
128             analyser.getByteFrequencyData(data);
129             
130             let sum=0,bass=0;
131             for(let i=0;i<data.length;i++){
132                 sum+=data[i];
133                 if(i<20)bass+=data[i];
134             }
135             
136             let avg=sum/data.length;
137             let newMood=avg>130?'high':avg>90?'focus':avg>50?'happy':'calm';
138             
139             if(newMood!==currentMood){
140                 currentMood=newMood;
141                 updateAffirmation();
142             }
143         },3000);
144     }
145     
146     function updateAffirmation(){
147         let list=affirmations[currentMood];
148         let text=list[Math.floor(Math.random()*list.length)];
149         
150         document.getElementById('affirmation').textContent=text;
151         document.getElementById('mood').textContent=currentMood+' energy';
152         
153         // Color based on mood
154         const colors={high:'#ff6b6b',calm:'#4ecdc4',focus:'#a78bfa',happy:'#fbbf24'};
155         document.getElementById('affirmation').style.color=colors[currentMood];
156     }
157     
157     function toggle(){
158         if(!ctx)return;
159         if(ctx.state==='suspended')ctx.resume();
160         
161         if(playing){
162             audio.pause();
163             playing=false;
164         }else{
165             audio.play().then(()=>{
166                 playing=true;
167             }).catch(err=>console.error('Play failed:',err));
168         }
169     }
170     
171     function seek(e){
172         let rect=e.currentTarget.getBoundingClientRect();
173         let pct=(e.clientX-rect.left)/rect.width;
174         audio.currentTime=pct*audio.duration;
175     }
176     
177     function save(){
178         let text=document.getElementById('affirmation').textContent;
179         let blob=new Blob([text+'\n\n— '+new Date().toLocaleString()],{type:'text/plain'});
180         let url=URL.createObjectURL(blob);
181         let a=document.createElement('a');
182         a.href=url;
183         a.download='my-affirmation.txt';
184         a.click();
185         URL.revokeObjectURL(url);
186     }
187     
188     function reset(){
189         audio.pause();
190         audio.currentTime=0;
191         playing=false;
192         
193         document.getElementById('player').classList.add('hidden');
194         document.getElementById('upload').classList.remove('hidden');
195         document.querySelector('input').value='';
196         
197         document.getElementById('affirmation').textContent='You are exactly where you need to be';
198         document.getElementById('affirmation').style.color='#fff';
199         document.getElementById('mood').textContent='Listening';
200     }
201     
202     audio.ontimeupdate=()=>{
203         if(audio.duration){
204             document.getElementById('fill').style.width=(audio.currentTime/audio.duration*100)+'%';
205         }
206     };
207     
208     // Drag and drop
209     let dropzone=document.getElementById('drop');
210     dropzone.ondragover=e=>{e.preventDefault();dropzone.style.borderColor='#888'};
211     dropzone.ondragleave=()=>dropzone.style.borderColor='#444';
212     dropzone.ondrop=e=>{
213         e.preventDefault();
214         dropzone.style.borderColor='#444';
215         if(e.dataTransfer.files[0]?.type.includes('audio')){
216             document.querySelector('input').files=e.dataTransfer.files;
217             load({target:{files:e.dataTransfer.files}});
218         }
219     };
220     
221     // Resize canvas
222     window.onresize=()=>{
223         let c=document.getElementById('viz');
224         c.width=window.innerWidth;
225         c.height=window.innerHeight;
226     };
227     </script>
228 </body>
229 </html>
