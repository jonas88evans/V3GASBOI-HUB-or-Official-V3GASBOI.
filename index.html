<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V3GASBOI | The Independence Code is Global 🌍🎰</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --pure-white: #FFFFFF;
            --off-white: #FAFAFA;
            --light-gray: #F5F5F5;
            --medium-gray: #E0E0E0;
            --dark-gray: #2D2D2D;
            --charcoal: #1A1A1A;
            --vegas-red: #DC2626;
            --bright-red: #EF4444;
            --soft-red: #FEE2E2;
            --gold: #D97706;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--pure-white);
            color: var(--charcoal);
            line-height: 1.6;
            overflow-x: hidden;
        }

        html {
            scroll-behavior: smooth;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 50px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        nav.scrolled {
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.08);
            padding: 15px 50px;
            background: rgba(255, 255, 255, 0.95);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--charcoal);
            text-transform: uppercase;
            letter-spacing: 4px;
            position: relative;
            z-index: 2;
        }

        .logo::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--vegas-red), var(--gold));
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.3s ease;
        }

        .logo:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .nav-links a {
            color: var(--dark-gray);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            position: relative;
            transition: color 0.3s;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--vegas-red);
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--vegas-red);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* Hero Section with Effects */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: var(--pure-white);
            padding: 120px 20px 80px;
            overflow: hidden;
        }

        /* Gradient Orbs */
        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float-orb 20s infinite ease-in-out;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: linear-gradient(135deg, rgba(220, 38, 38, 0.15), rgba(255, 100, 100, 0.1));
            top: -200px;
            right: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, rgba(217, 119, 6, 0.12), rgba(255, 180, 50, 0.08));
            bottom: -150px;
            left: -100px;
            animation-delay: 5s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, rgba(220, 38, 38, 0.1), transparent);
            top: 40%;
            left: 20%;
            animation-delay: 10s;
        }

        @keyframes float-orb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        /* Noise Texture Overlay */
        .noise-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0.03;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Grid Lines */
        .grid-lines {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(220, 38, 38, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(220, 38, 38, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
        }

        /* Floating Geometric Shapes */
        .floating-shapes {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            opacity: 0.06;
            animation: float-shape 25s infinite ease-in-out;
        }

        .shape:nth-child(1) {
            top: 20%;
            left: 10%;
            width: 100px;
            height: 100px;
            border: 2px solid var(--vegas-red);
            transform: rotate(45deg);
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            top: 60%;
            right: 15%;
            width: 150px;
            height: 150px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            animation-delay: 8s;
        }

        .shape:nth-child(3) {
            bottom: 30%;
            left: 25%;
            width: 80px;
            height: 80px;
            background: var(--vegas-red);
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            animation-delay: 16s;
        }

        .shape:nth-child(4) {
            top: 40%;
            right: 30%;
            width: 60px;
            height: 60px;
            border: 2px solid var(--charcoal);
            animation-delay: 4s;
        }

        @keyframes float-shape {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.06; }
            50% { transform: translateY(-40px) rotate(180deg); opacity: 0.1; }
        }

        /* Light Leak Effect */
        .light-leak {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                from 0deg at 50% 50%,
                transparent 0deg,
                rgba(255, 255, 255, 0.1) 60deg,
                transparent 120deg,
                rgba(220, 38, 38, 0.05) 180deg,
                transparent 240deg,
                rgba(217, 119, 6, 0.05) 300deg,
                transparent 360deg
            );
            animation: rotate-leak 30s linear infinite;
            pointer-events: none;
            opacity: 0.6;
        }

        @keyframes rotate-leak {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .hero-content {
            text-align: center;
            z-index: 2;
            max-width: 900px;
            position: relative;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 28px;
            background: rgba(254, 226, 226, 0.6);
            border: 1px solid rgba(220, 38, 38, 0.2);
            color: var(--vegas-red);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 40px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            animation: float 6s ease-in-out infinite;
            box-shadow: 0 4px 20px rgba(220, 38, 38, 0.1);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .hero h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 7vw, 5.5rem);
            font-weight: 900;
            margin-bottom: 25px;
            text-transform: uppercase;
            line-height: 1.1;
            color: var(--charcoal);
            letter-spacing: -2px;
            position: relative;
        }

        .hero h1 .highlight {
            background: linear-gradient(135deg, var(--vegas-red) 0%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: block;
            margin-top: 10px;
        }

        .hero-subtitle {
            font-size: 1.3rem;
            color: var(--dark-gray);
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .hero-description {
            font-size: 1.15rem;
            line-height: 1.8;
            margin-bottom: 50px;
            color: var(--dark-gray);
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            font-weight: 400;
        }

        .cta-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 18px 40px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: none;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn-primary {
            background: var(--charcoal);
            color: var(--pure-white);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
            z-index: -1;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            background: var(--vegas-red);
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.8);
            color: var(--charcoal);
            border: 2px solid var(--medium-gray);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            border-color: var(--vegas-red);
            color: var(--vegas-red);
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.95);
        }

        /* Links Section with Background */
        .links-section {
            padding: 100px 20px;
            background: var(--off-white);
            position: relative;
            overflow: hidden;
        }

        /* Subtle Pattern Background */
        .pattern-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0.4;
            background-image: 
                radial-gradient(circle at 25% 25%, rgba(220, 38, 38, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 75% 75%, rgba(217, 119, 6, 0.03) 0%, transparent 50%);
            background-size: 100px 100px;
        }

        /* Diagonal Lines */
        .diagonal-lines {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(220, 38, 38, 0.02) 10px,
                rgba(220, 38, 38, 0.02) 11px
            );
            pointer-events: none;
        }

        .section-header {
            text-align: center;
            margin-bottom: 70px;
            position: relative;
            z-index: 2;
        }

        .section-header h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            color: var(--charcoal);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .section-header p {
            font-size: 1.1rem;
            color: var(--dark-gray);
            max-width: 500px;
            margin: 0 auto;
        }

        .links-grid {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            position: relative;
            z-index: 2;
        }

        .link-card {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--medium-gray);
            padding: 35px;
            border-radius: 16px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 15px;
            backdrop-filter: blur(10px);
        }

        .link-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--vegas-red), var(--gold));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s ease;
        }

        .link-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            border-color: transparent;
            background: rgba(255, 255, 255, 0.95);
        }

        .link-card:hover::before {
            transform: scaleX(1);
        }

        .link-icon {
            width: 60px;
            height: 60px;
            background: var(--light-gray);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            transition: all 0.3s;
        }

        .link-card:hover .link-icon {
            background: var(--soft-red);
            transform: scale(1.1);
        }

        .link-content h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            color: var(--charcoal);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .link-content p {
            color: var(--dark-gray);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .link-arrow {
            position: absolute;
            bottom: 25px;
            right: 25px;
            width: 40px;
            height: 40px;
            background: var(--light-gray);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--charcoal);
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .link-card:hover .link-arrow {
            background: var(--vegas-red);
            color: white;
            transform: translateX(5px);
        }

        /* Platform Specific Glows */
        .link-card.soundcloud:hover { box-shadow: 0 20px 60px rgba(255, 85, 0, 0.2); }
        .link-card.apple:hover { box-shadow: 0 20px 60px rgba(250, 45, 100, 0.2); }
        .link-card.show4me:hover { box-shadow: 0 20px 60px rgba(138, 43, 226, 0.2); }
        .link-card.canva:hover { box-shadow: 0 20px 60px rgba(0, 180, 200, 0.2); }
        .link-card.godaddy:hover { box-shadow: 0 20px 60px rgba(3, 125, 78, 0.2); }
        .link-card.youtube:hover { box-shadow: 0 20px 60px rgba(255, 0, 0, 0.2); }
        .link-card.tidal:hover { box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2); }
        .link-card.hitmkr:hover { box-shadow: 0 20px 60px rgba(255, 193, 7, 0.2); }
        .link-card.voloco:hover { box-shadow: 0 20px 60px rgba(101, 31, 255, 0.2); }

        /* Email Capture Section */
        .capture-section {
            padding: 100px 20px;
            background: var(--pure-white);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated Gradient Border Top */
        .capture-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--vegas-red), var(--gold), var(--vegas-red));
            background-size: 200% 100%;
            animation: gradient-shift 3s linear infinite;
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        /* Floating Particles */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(220, 38, 38, 0.2);
            border-radius: 50%;
            animation: particle-float 15s infinite;
        }

        .particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 30%; top: 60%; animation-delay: 3s; }
        .particle:nth-child(3) { left: 50%; top: 30%; animation-delay: 6s; }
